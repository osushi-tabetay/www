minimum_prek_version = "0.3.0"
default_install_hook_types = ["pre-commit"]

exclude = '''(?x)^(
  \.astro/|
  \.wrangler/|
  dist/|
  node_modules/
)'''

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "check-added-large-files", args = ["--maxkb=2048"] },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "astro-check",
    name = "astro check",
    language = "system",
    entry = "pnpm exec astro check",
    files = "\\.(astro|css|js|json|jsonc|md|mjs|ts)$",
    pass_filenames = false,
  },
]
